<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐱 Cat vs Sharks</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean: #060d1a;
      --deep: #091525;
      --accent: #f0c040;
      --danger: #ff3a3a;
      --text: #e8f4ff;
      --muted: #5a8aaa;
    }

    body {
      background: var(--ocean);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Blood-tinted scanline atmosphere */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,30,30,0.012) 3px,
        rgba(255,30,30,0.012) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .bg-bubbles {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .bubble {
      position: absolute; border-radius: 50%;
      background: rgba(255,60,60,0.06);
      animation: rise linear infinite; bottom: -80px;
    }
    @keyframes rise {
      to { transform: translateY(-110vh) scale(1.2); opacity: 0; }
    }

    .wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      letter-spacing: 1px;
      color: var(--danger);
      text-shadow: 0 0 30px rgba(255,58,58,0.6), 0 0 60px rgba(255,58,58,0.2);
      animation: titlePulse 2s ease-in-out infinite alternate;
    }
    @keyframes titlePulse {
      from { text-shadow: 0 0 20px rgba(255,58,58,0.5); }
      to   { text-shadow: 0 0 40px rgba(255,58,58,0.9), 0 0 80px rgba(255,58,58,0.3); }
    }

    /* HUD */
    .hud {
      display: flex; gap: 28px; align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,60,60,0.2);
      border-radius: 50px;
      padding: 8px 24px;
      font-weight: 700; font-size: 1rem;
    }
    .hud-score { color: var(--accent); font-size: 1.1rem; }
    .hud-time  { color: #7de8ff; }
    .hud-lives { letter-spacing: 3px; font-size: 1.3rem; }

    /* Speed bar */
    .speed-bar-wrap {
      width: 480px; max-width: 90vw;
      display: flex; align-items: center; gap: 10px;
      font-size: 0.78rem; color: var(--muted);
    }
    .speed-bar-bg {
      flex: 1; height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px; overflow: hidden;
    }
    .speed-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ff0000);
      border-radius: 99px;
      transition: width 0.5s ease;
      box-shadow: 0 0 8px rgba(255,0,0,0.5);
    }

    /* Game area */
    #game {
      position: relative;
      width: 480px; height: 480px;
      max-width: 90vw; max-height: 90vw;
      border-radius: 20px;
      border: 2px solid rgba(255,60,60,0.25);
      overflow: hidden;
      cursor: none; touch-action: none; user-select: none;
      background: radial-gradient(ellipse at 40% 30%, #0d1f38, #060d1a 75%);
      box-shadow:
        0 0 80px rgba(6,13,26,0.95),
        inset 0 0 100px rgba(0,0,0,0.4),
        0 0 30px rgba(255,30,30,0.08);
    }

    /* Caustic water shimmer */
    #game::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        135deg,
        transparent, transparent 50px,
        rgba(100,180,255,0.025) 51px,
        rgba(100,180,255,0.025) 52px
      );
      pointer-events: none; z-index: 1;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      from { background-position: 0 0; }
      to   { background-position: 200px 200px; }
    }

    /* Entities */
    .entity {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 2;
      will-change: left, top;
    }

    /* Shark — uses custom SVG-like CSS shark fin silhouette via emoji + glow */
    .shark-emoji {
      font-size: 30px;
      display: block;
      filter: drop-shadow(0 0 8px rgba(255,60,60,0.8)) drop-shadow(0 0 2px #ff0000);
      transition: transform 0.05s linear;
    }

    /* Danger trail behind fast sharks */
    .shark-trail {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,30,30,0.15) 0%, transparent 70%);
      pointer-events: none;
      animation: trailFade 0.3s ease-out forwards;
    }
    @keyframes trailFade {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(2); }
    }

    .cat-emoji {
      font-size: 36px; display: block;
      filter: drop-shadow(0 0 12px rgba(240,192,64,0.7));
      animation: catBob 0.45s ease-in-out infinite alternate;
    }
    @keyframes catBob {
      from { transform: translateY(0) rotate(-4deg); }
      to   { transform: translateY(-4px) rotate(4deg); }
    }

    /* Catch particle */
    .particle {
      position: absolute; font-size: 22px;
      pointer-events: none; z-index: 3;
      animation: burst 0.5s ease-out forwards;
    }
    @keyframes burst {
      0%   { transform: scale(1) translateY(0); opacity: 1; }
      100% { transform: scale(2.5) translateY(-40px); opacity: 0; }
    }

    /* Red edge flash when shark escapes */
    .escape-flash {
      position: absolute; inset: 0;
      background: rgba(255, 0, 0, 0.25);
      pointer-events: none; z-index: 10;
      border-radius: 18px;
      animation: flashOut 0.45s ease-out forwards;
    }
    @keyframes flashOut {
      0%   { opacity: 1; box-shadow: inset 0 0 40px rgba(255,0,0,0.5); }
      100% { opacity: 0; }
    }

    /* Overlays */
    .overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: rgba(6,13,26,0.82);
      backdrop-filter: blur(10px);
      border-radius: 18px;
    }
    .overlay-emoji { font-size: 68px; animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes popIn {
      from { transform: scale(0.3) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }
    .overlay h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem; color: var(--danger);
      text-shadow: 0 0 20px rgba(255,58,58,0.5);
    }
    .overlay p { color: var(--muted); font-size: 0.95rem; text-align: center; max-width: 270px; line-height: 1.6; }

    .stat-row {
      display: flex; gap: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,60,60,0.15);
      border-radius: 14px; padding: 10px 22px;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-val { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--accent); }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    button {
      font-family: 'Nunito', sans-serif; font-weight: 700;
      font-size: 1.05rem; padding: 12px 34px;
      border: none; border-radius: 50px;
      background: var(--danger); color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,58,58,0.45);
    }
    button:hover { transform: scale(1.07); box-shadow: 0 6px 30px rgba(255,58,58,0.65); }
    button:active { transform: scale(0.96); }

    .hint { font-size: 0.78rem; color: var(--muted); }

    /* Screen shake on escape */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake 0.35s ease-out; }
  </style>
</head>
<body>

<div class="bg-bubbles" id="bgBubbles"></div>

<div class="wrapper" id="wrapper">
  <h1>🐱 Cat vs Sharks 🦈</h1>

  <div class="hud" id="hud" style="display:none">
    <span class="hud-score" id="scoreDisplay">Score: 0</span>
    <span class="hud-time"  id="timeDisplay">⏱ 0s</span>
    <span class="hud-lives" id="livesDisplay">🦈🦈🦈</span>
  </div>

  <div class="speed-bar-wrap" id="speedWrap" style="display:none">
    <span>🔥 Frenzy</span>
    <div class="speed-bar-bg"><div class="speed-bar-fill" id="speedBar" style="width:5%"></div></div>
  </div>

  <div id="game">
    <div class="overlay" id="startOverlay">
      <div class="overlay-emoji">🦈</div>
      <h2>Cat vs Sharks</h2>
      <p>Sharks are fast and hungry.<br>Catch them before they escape!<br>3 escapes = game over.</p>
      <button id="startBtn">Dive In 🐱</button>
      <span class="hint">Arrow keys / WASD / drag to move</span>
    </div>
  </div>

  <p class="hint">Sharks speed up every 15 seconds — good luck!</p>
</div>

<script>
  // ─── Constants ────────────────────────────────────────────────
  const GAME_W   = 480;
  const GAME_H   = 480;
  const CAT_SIZE = 48;
  const SHARK_SIZE = 38;
  const CAT_SPEED  = 7;

  // *** MUCH FASTER than the original ***
  const BASE_SHARK_SPEED_MIN = 2.8;   // was 0.8
  const BASE_SHARK_SPEED_MAX = 4.2;   // was 1.5
  const SPEED_RAMP_AMOUNT    = 0.6;   // was 0.35 — ramps faster too
  const SPEED_RAMP_INTERVAL  = 15;    // seconds
  const MAX_SPEED_MULT       = 5.0;   // was 4.0
  const SPAWN_INTERVAL       = 1600;  // slightly faster spawning too
  const MAX_LIVES = 3;

  // ─── State ────────────────────────────────────────────────────
  let catPos    = { x: GAME_W/2 - CAT_SIZE/2, y: GAME_H/2 - CAT_SIZE/2 };
  let sharks    = [];
  let score     = 0;
  let lives     = MAX_LIVES;
  let timeAlive = 0;
  let speedMult = 1;
  let sharkIdCounter = 0;
  let started   = false;
  let gameOver  = false;

  let rafHandle   = null;
  let spawnHandle = null;
  let timerHandle = null;
  let rampHandle  = null;

  const keys = new Set();

  // ─── DOM ──────────────────────────────────────────────────────
  const gameEl       = document.getElementById('game');
  const wrapperEl    = document.getElementById('wrapper');
  const hudEl        = document.getElementById('hud');
  const speedWrapEl  = document.getElementById('speedWrap');
  const scoreEl      = document.getElementById('scoreDisplay');
  const timeEl       = document.getElementById('timeDisplay');
  const livesEl      = document.getElementById('livesDisplay');
  const speedBarEl   = document.getElementById('speedBar');
  const startBtn     = document.getElementById('startBtn');

  // ─── Background red bubbles ───────────────────────────────────
  (function() {
    const c = document.getElementById('bgBubbles');
    for (let i = 0; i < 20; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 15 + Math.random() * 50;
      b.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}vw;
        animation-duration:${7+Math.random()*12}s;
        animation-delay:${Math.random()*10}s;
        opacity:${0.04+Math.random()*0.06};
      `;
      c.appendChild(b);
    }
  })();

  // ─── HUD helpers ──────────────────────────────────────────────
  function livesString(n) {
    return '🦈'.repeat(n) + '💀'.repeat(MAX_LIVES - n);
  }

  function updateHUD() {
    scoreEl.textContent = `Score: ${score}`;
    timeEl.textContent  = `⏱ ${timeAlive}s`;
    livesEl.textContent = livesString(lives);
    const pct = Math.min(100, 5 + ((speedMult - 1) / (MAX_SPEED_MULT - 1)) * 95);
    speedBarEl.style.width = pct + '%';
  }

  // ─── Cat ──────────────────────────────────────────────────────
  let catEl = null;
  function createCat() {
    catEl = document.createElement('div');
    catEl.className = 'entity';
    catEl.style.cssText = `width:${CAT_SIZE}px;height:${CAT_SIZE}px;z-index:5;`;
    catEl.innerHTML = '<span class="cat-emoji">🐱</span>';
    gameEl.appendChild(catEl);
  }
  function updateCatDOM() {
    if (!catEl) return;
    catEl.style.left = catPos.x + 'px';
    catEl.style.top  = catPos.y + 'px';
  }

  // ─── Sharks ───────────────────────────────────────────────────
  function spawnShark() {
    sharkIdCounter++;
    const id = sharkIdCounter;

    // Random direction — bias slightly horizontal for more screen crossing
    const angle = Math.random() * Math.PI * 2;
    const speed = BASE_SHARK_SPEED_MIN + Math.random() * (BASE_SHARK_SPEED_MAX - BASE_SHARK_SPEED_MIN);
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed * 0.7;

    const x = Math.random() * (GAME_W - SHARK_SIZE);
    const y = Math.random() * (GAME_H - SHARK_SIZE);

    const el = document.createElement('div');
    el.className = 'entity';
    el.id = 'shark-' + id;
    el.style.cssText = `width:${SHARK_SIZE}px;height:${SHARK_SIZE}px;left:${x}px;top:${y}px;`;
    // Flip based on direction, rotate to face movement
    const flipX = dx < 0 ? -1 : 1;
    const angle_deg = Math.atan2(dy, dx) * (180 / Math.PI);
    el.innerHTML = `<span class="shark-emoji" style="display:inline-block;transform:scaleX(${flipX})">🦈</span>`;
    gameEl.appendChild(el);

    sharks.push({ id, x, y, dx, dy, el });
  }

  function removeShark(s) {
    s.el.remove();
    sharks = sharks.filter(ss => ss.id !== s.id);
  }

  function moveSharks() {
    const escaped = [];
    for (const s of sharks) {
      s.x += s.dx * speedMult;
      s.y += s.dy * speedMult;
      s.el.style.left = s.x + 'px';
      s.el.style.top  = s.y + 'px';

      // Update facing direction dynamically
      const span = s.el.querySelector('.shark-emoji');
      if (span) span.style.transform = `scaleX(${s.dx < 0 ? -1 : 1})`;

      if (s.x < -SHARK_SIZE || s.x > GAME_W + 10 ||
          s.y < -SHARK_SIZE || s.y > GAME_H + 10) {
        escaped.push(s);
      }
    }
    for (const s of escaped) {
      removeShark(s);
      loseLife();
    }
  }

  // ─── Lives ────────────────────────────────────────────────────
  function loseLife() {
    lives = Math.max(0, lives - 1);
    updateHUD();

    // Red flash
    const flash = document.createElement('div');
    flash.className = 'escape-flash';
    gameEl.appendChild(flash);
    setTimeout(() => flash.remove(), 450);

    // Screen shake
    wrapperEl.classList.remove('shake');
    void wrapperEl.offsetWidth; // reflow to restart animation
    wrapperEl.classList.add('shake');
    setTimeout(() => wrapperEl.classList.remove('shake'), 350);

    if (lives <= 0) endGame();
  }

  // ─── Particles ────────────────────────────────────────────────
  function spawnParticle(x, y) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = ['💥','⚡','✨','🩸'][Math.floor(Math.random()*4)];
    p.style.left = x + 'px';
    p.style.top  = y + 'px';
    gameEl.appendChild(p);
    setTimeout(() => p.remove(), 520);
  }

  // ─── Collision ────────────────────────────────────────────────
  function checkCollisions() {
    const cx = catPos.x + CAT_SIZE / 2;
    const cy = catPos.y + CAT_SIZE / 2;
    const caught = [];

    for (const s of sharks) {
      const sx = s.x + SHARK_SIZE / 2;
      const sy = s.y + SHARK_SIZE / 2;
      const dx = cx - sx, dy = cy - sy;
      if (Math.sqrt(dx*dx + dy*dy) < (CAT_SIZE + SHARK_SIZE) / 2.6) {
        caught.push(s);
      }
    }

    for (const s of caught) {
      spawnParticle(s.x, s.y);
      removeShark(s);
      score++;
    }
    if (caught.length) updateHUD();
  }

  // ─── Game Loop ────────────────────────────────────────────────
  function loop() {
    if (!started || gameOver) return;

    if (keys.has('arrowleft') || keys.has('a')) catPos.x -= CAT_SPEED;
    if (keys.has('arrowright')|| keys.has('d')) catPos.x += CAT_SPEED;
    if (keys.has('arrowup')   || keys.has('w')) catPos.y -= CAT_SPEED;
    if (keys.has('arrowdown') || keys.has('s')) catPos.y += CAT_SPEED;

    catPos.x = Math.max(0, Math.min(GAME_W - CAT_SIZE, catPos.x));
    catPos.y = Math.max(0, Math.min(GAME_H - CAT_SIZE, catPos.y));

    updateCatDOM();
    moveSharks();
    checkCollisions();

    rafHandle = requestAnimationFrame(loop);
  }

  // ─── Start / End ──────────────────────────────────────────────
  function startGame() {
    catPos    = { x: GAME_W/2 - CAT_SIZE/2, y: GAME_H/2 - CAT_SIZE/2 };
    sharks    = [];
    score     = 0;
    lives     = MAX_LIVES;
    timeAlive = 0;
    speedMult = 1;
    gameOver  = false;
    started   = true;

    document.querySelectorAll('.entity, .particle, .overlay').forEach(e => e.remove());

    createCat();
    updateCatDOM();

    hudEl.style.display       = 'flex';
    speedWrapEl.style.display = 'flex';
    updateHUD();

    spawnShark();
    spawnHandle = setInterval(spawnShark, SPAWN_INTERVAL);

    timerHandle = setInterval(() => { timeAlive++; updateHUD(); }, 1000);

    rampHandle = setInterval(() => {
      speedMult = Math.min(speedMult + SPEED_RAMP_AMOUNT, MAX_SPEED_MULT);
    }, SPEED_RAMP_INTERVAL * 1000);

    rafHandle = requestAnimationFrame(loop);
  }

  function endGame() {
    gameOver = true;
    started  = false;

    cancelAnimationFrame(rafHandle);
    clearInterval(spawnHandle);
    clearInterval(timerHandle);
    clearInterval(rampHandle);

    for (const s of sharks) s.el.remove();
    sharks = [];

    const ov = document.createElement('div');
    ov.className = 'overlay';
    ov.innerHTML = `
      <div class="overlay-emoji">😿</div>
      <h2>Devoured!</h2>
      <div class="stat-row">
        <div class="stat">
          <span class="stat-val">${score}</span>
          <span class="stat-lbl">Sharks Caught</span>
        </div>
        <div class="stat">
          <span class="stat-val">${timeAlive}s</span>
          <span class="stat-lbl">Survived</span>
        </div>
      </div>
      <p>The sharks were relentless!<br>Think you can last longer?</p>
      <button id="retryBtn">Try Again 🦈</button>
    `;
    gameEl.appendChild(ov);
    document.getElementById('retryBtn').addEventListener('click', startGame);
  }

  // ─── Input ────────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    keys.add(e.key.toLowerCase());
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))
      e.preventDefault();
  });
  window.addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

  gameEl.addEventListener('pointermove', e => {
    if (!started) return;
    const rect = gameEl.getBoundingClientRect();
    const sx = GAME_W / rect.width, sy = GAME_H / rect.height;
    catPos.x = Math.max(0, Math.min(GAME_W - CAT_SIZE, (e.clientX - rect.left) * sx - CAT_SIZE / 2));
    catPos.y = Math.max(0, Math.min(GAME_H - CAT_SIZE, (e.clientY - rect.top)  * sy - CAT_SIZE / 2));
  });

  startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
